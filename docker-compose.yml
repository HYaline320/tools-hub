version: '3.8'
services:
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - FILE_STORAGE_PATH=/data/uploads
    volumes:
      - uploads:/data/uploads

  web:
    build:
      context: .
      dockerfile: services/web/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - gateway

volumes:
  uploads: