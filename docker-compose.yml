version: '3.8'

services:
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    container_name: tools-hub-gateway
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - FILE_STORAGE_PATH=/data/uploads
    volumes:
      - uploads:/data/uploads
    networks:
      - app-network

  web:
    build:
      context: .
      dockerfile: services/web/Dockerfile
    container_name: tools-hub-web
    ports:
      - "80:80"
    depends_on:
      - gateway
    networks:
      - app-network

volumes:
  uploads:

networks:
  app-network:
    driver: bridge